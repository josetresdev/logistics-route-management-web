<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#AAD500" rx="20"/>
  
  <!-- Route lines -->
  <g stroke="#7fa800" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Start point -->
    <circle cx="20" cy="20" r="4" fill="#7fa800"/>
    
    <!-- Route path -->
    <path d="M 25 20 Q 40 30, 50 25 Q 60 20, 70 30"/>
    
    <!-- Middle point -->
    <circle cx="70" cy="30" r="4" fill="#7fa800"/>
    
    <!-- Second segment -->
    <path d="M 75 30 Q 80 45, 75 60"/>
    
    <!-- End point -->
    <circle cx="75" cy="65" r="5" fill="#7fa800"/>
    
    <!-- Alternative route -->
    <path d="M 25 20 L 30 50 L 40 65" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Truck/delivery icon indicator -->
  <rect x="15" y="70" width="12" height="8" fill="#7fa800" rx="1"/>
  <circle cx="21" cy="80" r="2" fill="#fff"/>
</svg>