<div class="logs-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Historial de Operaciones en Rutas</mat-card-title>
      <button mat-icon-button (click)="refreshLogs()" [disabled]="isLoading">
        <mat-icon>refresh</mat-icon>
      </button>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="isLoading" class="loading-spinner">
        <mat-spinner></mat-spinner>
      </div>

      <table mat-table [dataSource]="logs" *ngIf="!isLoading" class="logs-table">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let row">{{ row.id }}</td>
        </ng-container>

        <ng-container matColumnDef="route_id">
          <th mat-header-cell *matHeaderCellDef>ID Ruta</th>
          <td mat-cell *matCellDef="let row">{{ row.route_id }}</td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Acción</th>
          <td mat-cell *matCellDef="let row" [ngClass]="'action-' + row.action">
            {{ getActionLabel(row.action) }}
          </td>
        </ng-container>

        <ng-container matColumnDef="timestamp">
          <th mat-header-cell *matHeaderCellDef>Fecha y Hora</th>
          <td mat-cell *matCellDef="let row">{{ row.timestamp | date:'medium' }}</td>
        </ng-container>

        <ng-container matColumnDef="details">
          <th mat-header-cell *matHeaderCellDef>Detalles</th>
          <td mat-cell *matCellDef="let row">
            <span class="details-badge">Info</span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="logs.length === 0 && !isLoading" class="no-data">
        <p>No hay registros de operaciones</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
