<div class="routes-list-container">

  <!-- ================= HEADER / FILTROS ================= -->
  <mat-card class="header-section">

    <div class="header-top">
      <h1>Gestión de Rutas</h1>
    </div>

    <div class="filters-wrapper">
      <app-route-filter
        (filterApplied)="loadFiltered($event)">
      </app-route-filter>
    </div>

  </mat-card>


  <!-- ================= TABLA ================= -->
  <mat-card class="table-section">

    <mat-card-header class="table-header">
      <mat-card-title>Rutas Disponibles</mat-card-title>

      <button
        mat-raised-button
        color="primary"
        class="execute-btn"
        [disabled]="selectedRoutes.length === 0"
        (click)="executeSelected()">

        <img src="/assets/icons/boton-de-play.png" class="icon-btn">
        Ejecutar ({{ selectedRoutes.length }})
      </button>
    </mat-card-header>

    <mat-card-content>

      <div *ngIf="isLoading" class="loading-spinner">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <div class="table-wrapper" *ngIf="!isLoading && routes.length > 0">

        <table mat-table [dataSource]="routes" class="routes-table">

          <!-- SELECT -->
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef>
              <mat-checkbox
                [checked]="isAllSelected()"
                [indeterminate]="isSomeSelected()"
                (change)="toggleAllSelection()">
              </mat-checkbox>
            </th>

            <td mat-cell *matCellDef="let row">
              <mat-checkbox
                [checked]="selectedRoutes.includes(row.id!)"
                (change)="toggleSelection(row.id!)">
              </mat-checkbox>
            </td>
          </ng-container>


          <!-- ID -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let row">
              <span class="id-badge">{{ row.id }}</span>
            </td>
          </ng-container>


          <!-- ORIGIN -->
          <ng-container matColumnDef="origin">
            <th mat-header-cell *matHeaderCellDef>Origen</th>
            <td mat-cell *matCellDef="let row">
              <div class="cell-with-icon">
                <img src="/assets/icons/mapas-y-banderas.png" class="icon-cell">
                {{ row.origin }}
              </div>
            </td>
          </ng-container>


          <!-- DESTINATION -->
          <ng-container matColumnDef="destination">
            <th mat-header-cell *matHeaderCellDef>Destino</th>
            <td mat-cell *matCellDef="let row">
              <div class="cell-with-icon">
                <img src="/assets/icons/mapas-y-banderas.png" class="icon-cell">
                {{ row.destination }}
              </div>
            </td>
          </ng-container>


          <!-- DISTANCE -->
          <ng-container matColumnDef="distance_km">
            <th mat-header-cell *matHeaderCellDef>Distancia</th>
            <td mat-cell *matCellDef="let row">
              <span class="badge distance-badge">
                <img src="/assets/icons/mapas-y-banderas.png" class="icon-badge">
                {{ row.distance_km }} km
              </span>
            </td>
          </ng-container>


          <!-- PRIORITY -->
          <ng-container matColumnDef="priority">
            <th mat-header-cell *matHeaderCellDef>Prioridad</th>
            <td mat-cell *matCellDef="let row">
              <span class="badge priority-badge"
                [ngClass]="'priority-' + (row.priority > 5 ? 'high' : row.priority > 3 ? 'medium' : 'low')">

                <img src="/assets/icons/flag-football.png" class="icon-badge">
                {{ row.priority }}

              </span>
            </td>
          </ng-container>


          <!-- STATUS -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let row">
              <span class="badge status-badge"
                [ngClass]="'status-' + row.status">

                <img src="/assets/icons/{{getStatusIcon(row.status)}}.png" class="icon-badge">
                {{ getStatusLabel(row.status) }}

              </span>
            </td>
          </ng-container>


          <!-- CREATED -->
          <ng-container matColumnDef="created_at">
            <th mat-header-cell *matHeaderCellDef>Creada</th>
            <td mat-cell *matCellDef="let row">
              <div class="cell-with-icon">
                <img src="/assets/icons/calendar-days.png" class="icon-cell">
                {{ row.created_at | date:'short' }}
              </div>
            </td>
          </ng-container>


          <!-- ACTIONS -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>

            <td mat-cell *matCellDef="let row">

              <button
                mat-icon-button
                class="delete-btn"
                matTooltip="Eliminar ruta"
                (click)="deleteRoute(row.id!)">

                <img src="/assets/icons/basura.png" class="icon-btn">

              </button>

            </td>
          </ng-container>


          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>

      </div>


      <!-- EMPTY STATE -->
      <div *ngIf="!isLoading && routes.length === 0" class="no-data">
        <img src="/assets/icons/mapas-y-banderas.png" class="icon-empty">
        <p>No hay rutas disponibles</p>
      </div>

    </mat-card-content>

  </mat-card>

</div>
