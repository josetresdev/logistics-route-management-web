<mat-toolbar class="app-toolbar" *ngIf="!isLoginPage()">
  <div class="toolbar-start">
    <button mat-icon-button [matMenuTriggerFor]="menu" class="menu-btn">
      <img src="/assets/icons/mapas-y-banderas.png" alt="Menu" class="toolbar-icon">
    </button>

    <mat-menu #menu="matMenu" class="nav-menu">
      <a mat-menu-item routerLink="/routes" routerLinkActive="active">
        <img src="/assets/icons/mapas-y-banderas.png" alt="Routes" class="menu-icon">
        <span>Listar Rutas</span>
      </a>
      <a mat-menu-item routerLink="/routes/import" routerLinkActive="active">
        <img src="/assets/icons/flecha-hacia-abajo.png" alt="Import" class="menu-icon">
        <span>Importar Rutas</span>
      </a>
      <a mat-menu-item routerLink="/routes/logs" routerLinkActive="active">
        <img src="/assets/icons/calendar-days.png" alt="Logs" class="menu-icon">
        <span>Historial de Logs</span>
      </a>
    </mat-menu>

    <div class="app-logo">
      <img src="/assets/icons/truck.png" alt="Logo" class="logo-icon">
      <span class="logo-divider">|</span>
      <span class="app-title">{{ title() }}</span>
    </div>
  </div>

  <span class="toolbar-spacer"></span>

  <div class="user-section">
    <button mat-icon-button class="notification-btn" [matMenuTriggerFor]="notifMenu">
      <img src="/assets/icons/advertencia.png" alt="Notifications" class="toolbar-icon">
      <span class="notification-badge">3</span>
    </button>

    <mat-menu #notifMenu="matMenu" class="notification-menu">
      <div class="notif-header">Notificaciones (3)</div>
      <div mat-menu-item class="notif-item">
        <img src="/assets/icons/garrapata.png" alt="Success" class="notif-icon">
        <div>
          <span>Importación completada</span>
          <small>Hace 5 min</small>
        </div>
      </div>
      <div mat-menu-item class="notif-item">
        <img src="/assets/icons/advertencia.png" alt="Warning" class="notif-icon">
        <div>
          <span>Ruta con conflicto</span>
          <small>Hace 1 hora</small>
        </div>
      </div>
    </mat-menu>

    <mat-divider vertical></mat-divider>

    <button mat-icon-button class="user-btn" [matMenuTriggerFor]="userMenu">
      <div class="avatar">A</div>
    </button>

    <mat-menu #userMenu="matMenu" class="user-menu">
      <div mat-menu-item disabled class="user-info">
        <div class="user-avatar-lg">A</div>
        <div>
          <span>{{ (currentUser$ | async)?.username || 'Admin User' }}</span>
          <small>admin@falabella.com</small>
        </div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()" class="logout-option">
        <img src="/assets/icons/flecha-hacia-abajo.png" alt="Logout" class="menu-icon">
        Cerrar Sesión
      </button>
    </mat-menu>
  </div>
</mat-toolbar>

<mat-sidenav-container class="app-container" *ngIf="!isLoginPage()">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <nav mat-nav-list>
      <mat-list-item class="dashboard-header">
        <img src="/assets/icons/flag-football.png" alt="Dashboard" class="sidenav-icon">
        <span>Panel de Control</span>
      </mat-list-item>

      <a mat-list-item routerLink="/routes" routerLinkActive="active-link">
        <img src="/assets/icons/mapas-y-banderas.png" alt="Routes" class="sidenav-icon">
        <span>Rutas</span>
      </a>

      <a mat-list-item routerLink="/routes/import" routerLinkActive="active-link">
        <img src="/assets/icons/flecha-hacia-abajo.png" alt="Import" class="sidenav-icon">
        <span>Importar</span>
      </a>

      <a mat-list-item routerLink="/routes/logs" routerLinkActive="active-link">
        <img src="/assets/icons/calendar-days.png" alt="Logs" class="sidenav-icon">
        <span>Logs</span>
      </a>

      <mat-divider></mat-divider>

      <button mat-list-item (click)="logout()">
        <img src="/assets/icons/flecha-hacia-abajo.png" alt="Logout" class="sidenav-icon">
        <span>Cerrar Sesión</span>
      </button>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>

<ng-container *ngIf="isLoginPage()">
  <router-outlet></router-outlet>
</ng-container>
